<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦊 Fox Run</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: manipulation;
    }
    body {
        margin: 0;
        background: #000;
        color: #0f0;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .game {
        width: 100%;
        max-width: 420px;
        text-align: center;
    }
    .top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 18px;
        background: #111;
        padding: 8px;
        border-radius: 8px;
    }
    canvas {
        width: 100%;
        border: 2px solid #0f0;
        background: #000;
        touch-action: none;
    }
    .controls {
        margin-top: 10px;
    }
    button {
        background: #111;
        color: #0f0;
        border: 1px solid #0f0;
        font-size: 22px;
        padding: 10px 15px;
        margin: 5px;
        border-radius: 10px;
        cursor: pointer;
    }
    button:active {
        background: #0f0;
        color: #000;
    }
    #msg {
        margin-top: 10px;
        font-size: 14px;
        min-height: 40px;
    }
</style>
</head>
<body>

<div class="game">
    <div class="top">
        <div>🦊 <span id="role">beta</span></div>
        <div>🔴 <span id="hunters">0</span></div>
        <div>⭐ <span id="score">0</span></div>
        <div>💀 <span id="attempts">3</span></div>
    </div>

    <canvas id="canvas" width="450" height="450"></canvas>

    <div class="controls">
        <button id="up">▲</button>
        <div>
            <button id="left">◀</button>
            <button id="down">▼</button>
            <button id="right">▶</button>
        </div>
        <button id="reset" style="background:#0f0; color:#000;">🔄 НОВАЯ ИГРА</button>
    </div>

    <div id="msg"></div>
</div>

<script src="game.js"></script>
</body>
</html>
